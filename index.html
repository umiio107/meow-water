<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>喵補水 MeowH2O Pro</title>
    <!-- 使用 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FDFCF9; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .soft-shadow { box-shadow: 8px 8px 16px #e0e0e0, -8px -8px 16px #ffffff; }
        .soft-inset { box-shadow: inset 4px 4px 8px #d1d1d1, inset -4px -4px 8px #ffffff; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input:focus { outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG 圖示組件 ---
        const IconDroplet = ({ size = 24, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z" /></svg>
        );
        const IconPlus = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
        );
        const IconHome = ({ size = 24, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>
        );
        const IconUtensils = ({ size = 24, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></svg>
        );
        const IconChevron = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6" /></svg>
        );
        const IconCamera = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></svg>
        );
        const IconSync = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><polyline points="3 21 3 16 8 16" /><polyline points="21 3 21 8 16 8" /></svg>
        );
        const IconCake = ({ size = 20, color = "currentColor" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8" /><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1" /><path d="M2 21h20" /><path d="M7 8v3" /><path d="M12 8v3" /><path d="M17 8v3" /><path d="M7 4h.01" /><path d="M12 4h.01" /><path d="M17 4h.01" /></svg>
        );

        // --- 子視圖組件 ---

        const HomeView = ({ activeCat, cats, onSwitchCat, onNavigate, calculateAge, dailyTarget, progress }) => (
            <div className="flex flex-col gap-6 animate-in">
                <div className="flex justify-between items-center px-2">
                    <div className="max-w-[150px]">
                        <p className="text-gray-400 text-sm font-bold">Hello, {activeCat.name}!</p>
                        <h1 className="text-2xl font-black text-gray-800">貓咪飲水</h1>
                    </div>
                    <div className="flex gap-2 items-center overflow-x-auto pb-2 no-scrollbar">
                        {cats.map((cat, idx) => (
                            <button key={cat.id} onClick={() => onSwitchCat(idx)} className={`w-12 h-12 flex-shrink-0 rounded-full overflow-hidden transition-all ${activeCat.id === cat.id ? 'ring-4 ring-blue-400 scale-110 shadow-lg' : 'opacity-40 grayscale'}`}>
                                {cat.profilePic ? <img src={cat.profilePic} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-white flex items-center justify-center text-2xl">{cat.icon}</div>}
                            </button>
                        ))}
                        <button onClick={() => onNavigate('add_cat')} className="w-12 h-12 flex-shrink-0 rounded-full bg-white soft-shadow flex items-center justify-center text-blue-500 hover:scale-110 active:scale-95 transition-all">
                            <IconPlus size={24} />
                        </button>
                    </div>
                </div>

                <div className={`${activeCat.color} rounded-[45px] p-8 relative overflow-hidden soft-shadow h-80 flex flex-col justify-between`}>
                    <div className="z-10">
                        <div className="flex items-center gap-2 mb-2">
                            <span className="p-1.5 bg-blue-500 rounded-full text-white shadow-md"><IconDroplet size={14} /></span>
                            <span className="font-bold text-gray-700">{activeCat.name} 今日進度</span>
                        </div>
                        <h2 className="text-5xl font-black text-gray-800">{activeCat.consumed} <span className="text-xl font-bold text-gray-500">ml</span></h2>
                        <div className="mt-4 flex flex-col gap-1 bg-white/30 backdrop-blur-sm p-3 rounded-2xl w-fit">
                            <p className="text-gray-700 text-xs font-bold flex items-center gap-1"><span className="opacity-60">體重:</span> {activeCat.weight} kg</p>
                            <p className="text-gray-700 text-xs font-bold flex items-center gap-1"><span className="opacity-60">年齡:</span> {calculateAge(activeCat.birthday)}</p>
                            <p className="text-gray-700 text-xs font-bold flex items-center gap-1"><span className="opacity-60">需求:</span> {dailyTarget} ml</p>
                        </div>
                    </div>
                    <div className="absolute bottom-0 left-0 w-full bg-white/40 transition-all duration-1000 ease-out" style={{ height: `${progress}%` }}>
                        <div className="w-full h-2 bg-blue-400/20 blur-sm"></div>
                    </div>
                    <button onClick={() => onNavigate('add')} className="absolute bottom-8 right-8 w-16 h-16 bg-white rounded-[24px] shadow-xl flex items-center justify-center text-blue-500 hover:scale-105 active:scale-95 transition-transform z-20">
                        <IconPlus size={36} />
                    </button>
                </div>

                <div className="grid grid-cols-2 gap-4">
                    <div onClick={() => onNavigate('wetfood')} className="bg-orange-50 rounded-[35px] p-6 soft-shadow relative h-44 cursor-pointer hover:bg-orange-100 transition-colors">
                        <div className="p-3 bg-white w-fit rounded-2xl mb-3 shadow-sm"><IconUtensils color="#f97316" /></div>
                        <h3 className="font-extrabold text-gray-700">濕食計算</h3>
                        <p className="text-[10px] text-gray-400 mt-1">換算罐頭含水量</p>
                    </div>
                    <div onClick={() => onNavigate('stats')} className="bg-green-50 rounded-[35px] p-6 soft-shadow relative h-44 cursor-pointer hover:bg-green-100 transition-colors">
                        <div className="p-3 bg-white w-fit rounded-2xl mb-3 shadow-sm"><IconSync color="#22c55e" /></div>
                        <h3 className="font-extrabold text-gray-700">數據備份</h3>
                        <p className="text-[10px] text-gray-400 mt-1">上傳至雲端試算表</p>
                    </div>
                </div>
            </div>
        );

        const AddView = ({ onBack, onAdd }) => {
            const [localAmount, setLocalAmount] = useState('');
            return (
                <div className="flex flex-col h-full animate-in">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={onBack} className="p-3 bg-white rounded-2xl soft-shadow text-gray-400"><IconChevron className="rotate-180" /></button>
                        <h2 className="text-xl font-black text-gray-700">手動紀錄飲水</h2>
                        <div className="w-12"></div>
                    </div>
                    <div className="flex-1 flex flex-col gap-10 items-center justify-center">
                        <div className="w-full">
                            <label className="block text-sm font-bold text-gray-400 mb-4 text-center">自定義毫升數 (ml)</label>
                            <input 
                                type="number" 
                                placeholder="輸入數字..." 
                                value={localAmount}
                                onChange={(e) => setLocalAmount(e.target.value)}
                                className="w-full bg-white p-6 rounded-[30px] soft-inset text-3xl font-black text-center text-blue-500 placeholder:text-gray-200"
                            />
                        </div>
                        <div className="grid grid-cols-3 gap-4 w-full">
                            {[20, 50, 100].map(amt => (
                                <button key={amt} onClick={() => onAdd(amt)} className="bg-white py-6 rounded-[25px] soft-shadow font-black text-gray-500 hover:text-blue-500 transition-all">+{amt}</button>
                            ))}
                        </div>
                    </div>
                    <button onClick={() => onAdd(localAmount)} className="mt-12 w-full py-6 bg-gray-800 text-white rounded-[30px] font-black text-lg shadow-2xl active:scale-95 transition-all">確認紀錄</button>
                </div>
            );
        };

        const WetFoodView = ({ onBack, onAdd }) => {
            const [brand, setBrand] = useState('');
            const [weight, setWeight] = useState('');
            const [percent, setPercent] = useState('80');

            return (
                <div className="flex flex-col h-full animate-in">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={onBack} className="p-3 bg-white rounded-2xl soft-shadow text-gray-400"><IconChevron className="rotate-180" /></button>
                        <h2 className="text-xl font-black text-gray-700">濕食換算</h2>
                        <div className="w-12"></div>
                    </div>
                    <div className="flex flex-col gap-6">
                        <div className="bg-orange-50 p-6 rounded-[35px] border border-orange-100">
                            <p className="text-xs text-orange-400 font-bold mb-1">計算公式</p>
                            <p className="text-sm text-orange-700 leading-relaxed font-bold">水分 (ml) = 淨重 (g) × 水分%</p>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-2 ml-4">罐頭品牌</label>
                                <input type="text" defaultValue={brand} onBlur={e => setBrand(e.target.value)} placeholder="例如：汪喵、凱特..." className="w-full bg-white p-5 rounded-2xl soft-inset font-bold" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-2 ml-4">淨重 (g)</label>
                                    <input type="number" defaultValue={weight} onChange={e => setWeight(e.target.value)} placeholder="80" className="w-full bg-white p-5 rounded-2xl soft-inset font-bold" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-2 ml-4">水分 (%)</label>
                                    <input type="number" defaultValue={percent} onChange={e => setPercent(e.target.value)} placeholder="80" className="w-full bg-white p-5 rounded-2xl soft-inset font-bold text-blue-500" />
                                </div>
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[35px] soft-shadow text-center mt-4">
                            <p className="text-xs font-bold text-gray-400 mb-1">預計增加</p>
                            <h4 className="text-4xl font-black text-orange-500">
                                {weight && percent ? Math.round(parseFloat(weight) * (parseFloat(percent)/100)) : 0} <span className="text-lg font-bold text-gray-400">ml</span>
                            </h4>
                        </div>
                    </div>
                    <button onClick={() => {
                        const w = parseFloat(weight);
                        const p = parseFloat(percent)/100;
                        if(!isNaN(w) && !isNaN(p)) onAdd(Math.round(w*p));
                    }} className="mt-12 py-6 bg-orange-500 text-white rounded-[30px] font-black text-lg shadow-2xl active:scale-95 transition-all">加入紀錄</button>
                </div>
            );
        };

        // --- 新增貓咪 / 編輯資料 共用元件 ---
        const ProfileEditor = ({ title, initialData, onBack, onSave, isNew = false }) => {
            const [localName, setLocalName] = useState(initialData.name || "");
            const [localBirthday, setLocalBirthday] = useState(initialData.birthday || new Date().toISOString().split('T')[0]);
            const [localWeight, setLocalWeight] = useState(initialData.weight || 4);
            const [localPic, setLocalPic] = useState(initialData.profilePic || null);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setLocalPic(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSave = () => {
                onSave({
                    name: localName,
                    birthday: localBirthday,
                    weight: parseFloat(localWeight) || 0,
                    profilePic: localPic
                });
            };

            return (
                <div className="flex flex-col h-full animate-in">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={onBack} className="p-3 bg-white rounded-2xl soft-shadow text-gray-400"><IconChevron className="rotate-180" /></button>
                        <h2 className="text-xl font-black text-gray-700">{title}</h2>
                        <div className="w-12"></div>
                    </div>
                    <div className="flex flex-col items-center gap-8">
                        <div className="relative">
                            <div className="w-40 h-40 rounded-[45px] bg-white soft-shadow overflow-hidden flex items-center justify-center border-8 border-white">
                                {localPic ? <img src={localPic} className="w-full h-full object-cover" /> : <div className="text-7xl">{initialData.icon || '🐱'}</div>}
                            </div>
                            <label className="absolute -bottom-2 -right-2 p-4 bg-blue-500 text-white rounded-[20px] shadow-xl cursor-pointer hover:scale-110 transition-transform">
                                <IconCamera size={20} />
                                <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                            </label>
                        </div>
                        <div className="w-full space-y-4">
                            <div className="bg-white p-5 rounded-[30px] soft-shadow">
                                <label className="block text-xs font-bold text-gray-400 mb-1 ml-1">貓咪姓名</label>
                                <input 
                                    type="text" 
                                    defaultValue={localName}
                                    onChange={(e) => setLocalName(e.target.value)}
                                    placeholder="輸入姓名..."
                                    className="w-full bg-transparent border-b border-gray-100 py-1 text-xl font-black text-gray-800" 
                                />
                            </div>
                            <div className="bg-white p-5 rounded-[30px] soft-shadow">
                                <label className="block text-xs font-bold text-gray-400 mb-1 ml-1">出生日期</label>
                                <div className="flex items-center gap-3">
                                    <IconCake size={18} color="#f472b6" />
                                    <input 
                                        type="date" 
                                        value={localBirthday} 
                                        onChange={(e) => setLocalBirthday(e.target.value)} 
                                        className="flex-1 bg-transparent border-b border-gray-100 py-1 text-xl font-black text-pink-500" 
                                    />
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-[30px] soft-shadow">
                                <label className="block text-xs font-bold text-gray-400 mb-1 ml-1">體重 (kg)</label>
                                <div className="flex items-center gap-4">
                                    <input 
                                        type="number" 
                                        step="0.1" 
                                        defaultValue={localWeight}
                                        onChange={(e) => setLocalWeight(e.target.value)}
                                        className="flex-1 bg-transparent border-b border-gray-100 py-1 text-xl font-black text-blue-500" 
                                    />
                                    <span className="font-bold text-gray-400">公斤</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onClick={handleSave} className="mt-12 py-6 bg-gray-800 text-white rounded-[30px] font-black text-lg shadow-xl active:scale-95 transition-all">
                        {isNew ? '確認新增' : '保存設定'}
                    </button>
                </div>
            );
        };

        const StatsView = ({ onBack, isSyncing, syncStatus, onSync }) => (
            <div className="flex flex-col h-full animate-in">
                <div className="flex items-center justify-between mb-8">
                    <button onClick={onBack} className="p-3 bg-white rounded-2xl soft-shadow text-gray-400"><IconChevron className="rotate-180" /></button>
                    <h2 className="text-xl font-black text-gray-700">數據管理</h2>
                    <div className="w-12"></div>
                </div>
                <div className="bg-white p-10 rounded-[45px] soft-shadow flex flex-col items-center text-center">
                    <div className="w-24 h-24 bg-blue-50 rounded-[35px] flex items-center justify-center text-blue-500 mb-8 soft-inset shadow-sm"><IconSync size={40} /></div>
                    <h3 className="text-2xl font-black text-gray-800">雲端備份</h3>
                    <p className="text-sm text-gray-400 mt-4 font-bold px-4">將數據同步至 Google 試算表。</p>
                    <button onClick={onSync} disabled={isSyncing} className={`mt-12 w-full py-6 rounded-[28px] font-black transition-all flex items-center justify-center gap-3 ${syncStatus === 'success' ? 'bg-green-500 text-white shadow-lg' : isSyncing ? 'bg-gray-100 text-gray-400' : 'bg-blue-500 text-white shadow-xl active:scale-95'}`}>
                        {isSyncing ? "同步中..." : "立即同步"}
                    </button>
                </div>
            </div>
        );

        // --- 主入口 ---
        const App = () => {
            const [activeView, setActiveView] = useState('home'); 
            const [cats, setCats] = useState(() => {
                const saved = localStorage.getItem('meow_h2o_cats_v3');
                const defaultDate = new Date().toISOString().split('T')[0];
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Mallowie', weight: 4, birthday: defaultDate, consumed: 0, color: 'bg-blue-100', icon: '🐱', profilePic: null },
                ];
            });
            const [activeCatIndex, setActiveCatIndex] = useState(0);
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState(null);

            const activeCat = cats[activeCatIndex];
            const dailyTarget = Math.round((activeCat?.weight || 4) * 55);
            const progress = Math.min(((activeCat?.consumed || 0) / dailyTarget) * 100, 100);

            useEffect(() => {
                localStorage.setItem('meow_h2o_cats_v3', JSON.stringify(cats));
            }, [cats]);

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwI5BBDVWyeBKmrc-oYTDuZ3szkNG0pQROOpJ4gpiB85wnZvFSTupUzg3bbIMoTBY5f/exec";

            const calculateAge = (birthday) => {
                if (!birthday) return "未知";
                const birthDate = new Date(birthday);
                const today = new Date();
                if (isNaN(birthDate.getTime())) return "日期錯誤";
                let years = today.getFullYear() - birthDate.getFullYear();
                let months = today.getMonth() - birthDate.getMonth();
                if (months < 0 || (months === 0 && today.getDate() < birthDate.getDate())) {
                    years--;
                    months += 12;
                }
                return years < 0 ? "尚未出生" : (years === 0 ? `${months} 個月` : `${years} 歲 ${months} 月`);
            };

            const handleAddWater = (amt) => {
                const amount = parseInt(amt);
                if (isNaN(amount)) return;
                const newCats = [...cats];
                newCats[activeCatIndex].consumed += amount;
                setCats(newCats);
                setActiveView('home');
            };

            const handleAddNewCat = (newCatData) => {
                const newCat = {
                    id: Date.now(),
                    ...newCatData,
                    consumed: 0,
                    color: ['bg-blue-100', 'bg-yellow-100', 'bg-green-100', 'bg-purple-100', 'bg-pink-100'][cats.length % 5],
                    icon: '🐱'
                };
                setCats([...cats, newCat]);
                setActiveCatIndex(cats.length);
                setActiveView('home');
            };

            const handleUpdateProfile = (updatedData) => {
                const newCats = [...cats];
                newCats[activeCatIndex] = { ...newCats[activeCatIndex], ...updatedData };
                setCats(newCats);
                setActiveView('home');
            };

            const syncToGoogleSheets = async () => {
                setIsSyncing(true);
                try {
                    const data = {
                        date: new Date().toLocaleDateString(),
                        catName: activeCat.name,
                        amount: activeCat.consumed,
                        target: dailyTarget,
                        weight: activeCat.weight,
                        birthday: activeCat.birthday
                    };
                    await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data) });
                    setSyncStatus('success');
                    setTimeout(() => setSyncStatus(null), 3000);
                } catch (e) {
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(null), 3000);
                } finally { setIsSyncing(false); }
            };

            return (
                <div className="min-h-screen flex justify-center p-4">
                    <div className="w-full max-w-md flex flex-col relative pb-32 pt-4">
                        <div className="flex-1">
                            {activeView === 'home' && (
                                <HomeView 
                                    activeCat={activeCat} cats={cats} onSwitchCat={setActiveCatIndex} 
                                    onNavigate={setActiveView} calculateAge={calculateAge} dailyTarget={dailyTarget} progress={progress} 
                                />
                            )}
                            {activeView === 'add' && <AddView onBack={() => setActiveView('home')} onAdd={handleAddWater} />}
                            {activeView === 'wetfood' && <WetFoodView onBack={() => setActiveView('home')} onAdd={handleAddWater} />}
                            {activeView === 'stats' && <StatsView onBack={() => setActiveView('home')} isSyncing={isSyncing} syncStatus={syncStatus} onSync={syncToGoogleSheets} />}
                            {activeView === 'profile' && <ProfileEditor title="編輯資料" initialData={activeCat} onBack={() => setActiveView('home')} onSave={handleUpdateProfile} />}
                            {activeView === 'add_cat' && <ProfileEditor title="新增貓咪" initialData={{}} onBack={() => setActiveView('home')} onSave={handleAddNewCat} isNew={true} />}
                        </div>

                        {activeView !== 'add' && activeView !== 'wetfood' && (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-sm bg-white/90 backdrop-blur-xl rounded-[40px] py-4 px-10 flex justify-between items-center shadow-2xl border border-white/50 z-50">
                                <button onClick={() => setActiveView('home')} className={`transition-all duration-300 ${activeView === 'home' ? 'text-blue-500 scale-125' : 'text-gray-300'}`}><IconHome size={28} /></button>
                                <button onClick={() => setActiveView('profile')} className={`transition-all duration-300 ${activeView === 'profile' ? 'text-blue-500 scale-125' : 'text-gray-300'}`}>
                                    <div className={`w-9 h-9 rounded-full border-2 overflow-hidden shadow-sm transition-colors ${activeView === 'profile' ? 'border-blue-400' : 'border-gray-300'}`}>
                                        {activeCat?.profilePic ? <img src={activeCat.profilePic} className="w-full h-full object-cover" /> : <div className="text-sm bg-white flex items-center justify-center h-full font-bold">{activeCat?.icon || '🐱'}</div>}
                                    </div>
                                </button>
                                <button onClick={() => setActiveView('stats')} className={`transition-all duration-300 ${activeView === 'stats' ? 'text-blue-500 scale-125' : 'text-gray-300'}`}><IconSync size={28} /></button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
