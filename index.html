<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵補水 MeowH2O</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FDFCF9; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 自定義波浪動畫預留 */
        .water-wave {
            position: relative;
            background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 內嵌 SVG 圖示組件，避免外部載入錯誤 ---
        const IconDroplet = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z" />
            </svg>
        );

        const IconPlus = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
            </svg>
        );

        const IconHome = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" />
            </svg>
        );

        const IconChart = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="20" x2="12" y2="10" /><line x1="18" y1="20" x2="18" y2="4" /><line x1="6" y1="20" x2="6" y2="16" />
            </svg>
        );

        const IconSettings = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        );

        const IconUtensils = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />
            </svg>
        );

        const IconChevron = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="9 18 15 12 9 6" />
            </svg>
        );

        const IconSync = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><polyline points="3 21 3 16 8 16" /><polyline points="21 3 21 8 16 8" />
            </svg>
        );

        const IconDatabase = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
            </svg>
        );

        const IconLoader = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}>
                <line x1="12" y1="2" x2="12" y2="6" /><line x1="12" y1="18" x2="12" y2="22" /><line x1="4.93" y1="4.93" x2="7.76" y2="7.76" /><line x1="16.24" y1="16.24" x2="19.07" y2="19.07" /><line x1="2" y1="12" x2="6" y2="12" /><line x1="18" y1="12" x2="22" y2="12" /><line x1="4.93" y1="19.07" x2="7.76" y2="16.24" /><line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
            </svg>
        );

        // --- 主應用程式 ---
        const INITIAL_CATS = [
            { id: 1, name: 'Mallowie', weight: 4.5, target: 225, consumed: 120, color: 'bg-blue-100', icon: '🐱' },
            { id: 2, name: 'Calvin', weight: 5.2, target: 260, consumed: 80, color: 'bg-yellow-100', icon: '🦁' },
        ];

        const App = () => {
            const [activeView, setActiveView] = useState('home'); 
            const [cats, setCats] = useState(INITIAL_CATS);
            const [activeCatIndex, setActiveCatIndex] = useState(0);
            const [addAmount, setAddAmount] = useState(50);
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncStatus, setSyncStatus] = useState(null); 

            const activeCat = cats[activeCatIndex];
            const progress = Math.min((activeCat.consumed / activeCat.target) * 100, 100);

            const scriptUrl = "https://script.google.com/macros/s/AKfycbwI5BBDVWyeBKmrc-oYTDuZ3szkNG0pQROOpJ4gpiB85wnZvFSTupUzg3bbIMoTBY5f/exec"; 

            const syncToGoogleSheets = async () => {
                setIsSyncing(true);
                setSyncStatus(null);
                
                try {
                    const data = {
                        date: new Date().toLocaleDateString(),
                        catName: activeCat.name,
                        amount: activeCat.consumed,
                        target: activeCat.target
                    };

                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(data)
                    });
                    
                    setSyncStatus('success');
                    setTimeout(() => setSyncStatus(null), 3000);
                } catch (error) {
                    console.error("同步失敗:", error);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(null), 3000);
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleAddWater = () => {
                const updatedCats = [...cats];
                updatedCats[activeCatIndex].consumed += addAmount;
                setCats(updatedCats);
                setActiveView('home');
                setAddAmount(50);
            };

            const HomeView = () => (
                <div className="flex flex-col gap-6 animate-in">
                    <div className="flex justify-between items-center px-2">
                        <div>
                            <p className="text-gray-400 text-sm">Hello, 主人</p>
                            <h1 className="text-2xl font-bold text-gray-800">今天, 紀錄中</h1>
                        </div>
                        <div className="flex gap-2">
                            {cats.map((cat, idx) => (
                                <button 
                                    key={cat.id}
                                    onClick={() => setActiveCatIndex(idx)}
                                    className={`w-10 h-10 rounded-full flex items-center justify-center text-xl transition-all ${activeCatIndex === idx ? 'ring-2 ring-blue-400 scale-110 shadow-lg' : 'opacity-50'}`}
                                    style={{ backgroundColor: activeCatIndex === idx ? 'white' : '#f3f4f6' }}
                                >
                                    {cat.icon}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className={`${activeCat.color} rounded-[40px] p-8 relative overflow-hidden shadow-sm h-64 flex flex-col justify-between`}>
                        <div className="z-10">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="p-1 bg-blue-500 rounded-full text-white">
                                    <IconDroplet size={14} />
                                </span>
                                <span className="font-semibold text-gray-700">每日飲水進度</span>
                            </div>
                            <h2 className="text-4xl font-bold text-gray-800">{activeCat.consumed} <span className="text-lg font-normal">ml</span></h2>
                            <p className="text-gray-500 text-sm mt-1">目標: {activeCat.target} ml</p>
                        </div>
                        <div className="absolute bottom-0 left-0 w-full bg-white/30 transition-all duration-700" style={{ height: `${progress}%` }}>
                            <div className="absolute top-0 left-0 w-full h-1 bg-blue-400/20"></div>
                        </div>
                        <button onClick={() => setActiveView('add')} className="absolute bottom-6 right-6 w-14 h-14 bg-white rounded-2xl shadow-md flex items-center justify-center text-blue-500 hover:scale-105 transition-transform">
                            <IconPlus size={32} />
                        </button>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-orange-100 rounded-[30px] p-6 shadow-sm relative h-40">
                            <IconUtensils className="text-orange-500 mb-2" />
                            <h3 className="font-bold text-gray-700">濕食計算</h3>
                            <button className="absolute bottom-4 right-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm">
                                <IconPlus size={20} className="text-orange-500" />
                            </button>
                        </div>
                        <div className="bg-purple-100 rounded-[30px] p-6 shadow-sm relative h-40">
                            <IconChart className="text-purple-500 mb-2" />
                            <h3 className="font-bold text-gray-700">飲水趨勢</h3>
                            <button className="absolute bottom-4 right-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm">
                                <IconChevron size={20} className="text-purple-500" />
                            </button>
                        </div>
                    </div>
                </div>
            );

            const AddView = () => (
                <div className="flex flex-col h-full animate-in">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={() => setActiveView('home')} className="p-2 text-gray-400 hover:text-gray-600 transition-colors">
                            <IconChevron className="rotate-180" />
                        </button>
                        <h2 className="text-xl font-bold text-gray-700">記錄飲水</h2>
                        <div className="w-10"></div>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center">
                        <div className="w-48 h-80 bg-blue-50 rounded-t-[60px] rounded-b-[30px] border-8 border-white shadow-xl relative overflow-hidden">
                            <div className="absolute bottom-0 left-0 w-full bg-blue-400 transition-all duration-500 flex items-center justify-center" style={{ height: `${(addAmount / 500) * 100}%` }}>
                                <span className="text-white font-bold text-xl">{addAmount}ml</span>
                            </div>
                            <div className="absolute inset-0 flex flex-col justify-between py-10 px-4 opacity-10">
                                {[400, 300, 200, 100].map(v => <div key={v} className="w-full border-t border-black"></div>)}
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-4 mt-12 w-full max-w-xs">
                            {[20, 50, 100].map(val => (
                                <button key={val} onClick={() => setAddAmount(val)} className={`py-4 rounded-2xl font-bold transition-all ${addAmount === val ? 'bg-blue-500 text-white shadow-lg scale-105' : 'bg-white text-gray-400 shadow-sm'}`}>+{val}</button>
                            ))}
                        </div>
                    </div>
                    <button onClick={handleAddWater} className="mt-12 w-full py-5 bg-gray-800 text-white rounded-[25px] font-bold text-lg shadow-xl active:scale-95 transition-all">確認紀錄</button>
                </div>
            );

            const StatsView = () => (
                <div className="flex flex-col gap-6 animate-in">
                    <h2 className="text-2xl font-bold text-center text-gray-800 mb-4">數據管理</h2>
                    <section className="bg-white rounded-[35px] p-8 shadow-sm border border-blue-50 flex flex-col items-center text-center">
                        <div className="w-20 h-20 bg-blue-50 rounded-[30px] flex items-center justify-center text-blue-500 mb-4 shadow-inner">
                            <IconDatabase size={36} />
                        </div>
                        <h3 className="text-xl font-bold text-gray-800">雲端備份</h3>
                        <p className="text-sm text-gray-400 mt-2 mb-6">將紀錄匯入至 Google 試算表</p>
                        <button 
                            onClick={syncToGoogleSheets} 
                            disabled={isSyncing}
                            className={`w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all ${
                                syncStatus === 'success' ? 'bg-green-500 text-white shadow-lg' : 
                                syncStatus === 'error' ? 'bg-red-500 text-white shadow-lg' : 
                                'bg-blue-500 text-white shadow-lg active:scale-95'
                            }`}
                        >
                            {isSyncing ? <IconLoader size={20} /> : <IconSync size={20} />}
                            {syncStatus === 'success' ? '匯入成功！' : 
                             syncStatus === 'error' ? '同步出錯了' :
                             isSyncing ? '正在傳送...' : '立即匯入試算表'}
                        </button>
                    </section>
                </div>
            );

            return (
                <div className="min-h-screen flex justify-center p-4">
                    <div className="w-full max-w-md flex flex-col relative pb-24">
                        <div className="flex-1 pt-6 px-2">
                            {activeView === 'home' && <HomeView />}
                            {activeView === 'add' && <AddView />}
                            {activeView === 'stats' && <StatsView />}
                            {activeView === 'profile' && (
                                <div className="flex flex-col items-center justify-center h-64 text-gray-400">
                                    <IconSettings size={48} className="mb-4" />
                                    <p>設定功能開發中</p>
                                    <button onClick={() => setActiveView('home')} className="mt-4 text-blue-500 underline">返回首頁</button>
                                </div>
                            )}
                        </div>
                        {activeView !== 'add' && (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/80 backdrop-blur-md rounded-[35px] py-4 px-8 flex justify-between items-center shadow-2xl border border-white/50 z-50">
                                <button onClick={() => setActiveView('home')} className={activeView === 'home' ? 'text-gray-900 scale-110' : 'text-gray-300'}><IconHome size={24} /></button>
                                <button onClick={() => setActiveView('stats')} className={activeView === 'stats' ? 'text-gray-900 scale-110' : 'text-gray-300'}><IconChart size={24} /></button>
                                <button onClick={() => setActiveView('profile')} className={activeView === 'profile' ? 'text-gray-900 scale-110' : 'text-gray-300'}><IconSettings size={24} /></button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
